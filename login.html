<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión — Eprocash Academy</title>
    <link rel="icon" href="images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- NAVBAR -->
<header class="navbar" id="navbar">
    <div class="logo">
        <a href="index.html"><img src="images/logo.png" alt="Eprocash Academy"></a>
    </div>
    <nav>
        <ul class="menu" id="menu">
            <li><a href="bitcoin.html"><i class="fa-brands fa-bitcoin"></i> Bitcoin</a></li>
            <li><a href="trading.html"><i class="fa-solid fa-chart-line"></i> Trading</a></li>
            <li><a href="cursos.html"><i class="fa-solid fa-graduation-cap"></i> Cursos</a></li>
        </ul>
    </nav>
    <div class="right-icons">
        <button id="theme-toggle" title="Cambiar tema">
            <i class="fa-solid fa-moon" id="theme-icon"></i>
        </button>
        <a href="registro.html" class="register-btn">
            Registrarse <i class="fa-solid fa-arrow-right"></i>
        </a>
    </div>
    <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menú">
        <span></span><span></span><span></span>
    </button>
</header>
<div class="menu-overlay" id="menu-overlay"></div>

<!-- CONTENIDO LOGIN -->
<main class="auth-page">
    <div class="auth-container">

        <!-- Zenix lado izquierdo -->
        <div class="auth-zenix">
            <img src="images/zenix_guiño.png" alt="Zenix">
            <h2>¡Hola de nuevo,<br><span class="gradient-text">bienvenido!</span></h2>
            <p>Continúa tu camino hacia la libertad financiera.</p>
        </div>

        <!-- Formulario -->
        <div class="auth-box">
            <h1>Iniciar sesión</h1>
            <p class="auth-subtitle">Accede a tu cuenta de Eprocash Academy</p>

            <form class="auth-form" id="login-form" novalidate>

                <div class="form-field">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" placeholder="tucorreo@email.com" autocomplete="email" required>
                </div>

                <div class="form-field">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="Tu contraseña" autocomplete="current-password" required>
                </div>

                <div style="text-align:right; margin-top:-8px;">
                    <a href="#" style="font-size:13px; color:var(--cyan);">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" class="primary-btn">
                    Iniciar sesión <i class="fa-solid fa-arrow-right"></i>
                </button>

            </form>

            <div class="auth-footer">
                ¿No tienes cuenta? <a href="registro.html">Regístrate gratis</a>
            </div>
        </div>

    </div>
</main>

<script src="js/app.js"></script>

</body>
</html>
