<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro — Eprocash Academy</title>
    <link rel="icon" href="images/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/perfil.css">
</head>
<body>

<!-- NAVBAR -->
<header class="navbar" id="navbar">
    <div class="logo">
        <a href="index.html"><img src="images/logo.png" alt="Eprocash Academy"></a>
    </div>
    <nav>
        <ul class="menu" id="menu">
            <li><a href="bitcoin.html"><i class="fa-brands fa-bitcoin"></i> Bitcoin</a></li>
            <li><a href="trading.html"><i class="fa-solid fa-chart-line"></i> Trading</a></li>
            <li><a href="cursos.html"><i class="fa-solid fa-graduation-cap"></i> Cursos</a></li>
        </ul>
    </nav>
    <div class="right-icons">
        <button id="theme-toggle" title="Cambiar tema">
            <i class="fa-solid fa-moon" id="theme-icon"></i>
        </button>
        <a href="login.html" class="login-btn">Iniciar sesión</a>
    </div>
    <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menú">
        <span></span><span></span><span></span>
    </button>
</header>
<div class="menu-overlay" id="menu-overlay"></div>


<!-- CONTENIDO REGISTRO -->
<main class="auth-page">
    <div class="auth-container">

        <!-- Zenix lado izquierdo -->
        <div class="auth-zenix">
            <img src="images/zenix_saludando.png" alt="Zenix">
            <h2>Bienvenido a<br><span class="gradient-text">Eprocash Academy</span></h2>
            <p>Al registrarte recibirás tu propio<br><strong style="color:var(--cyan)">Zenix digital exclusivo</strong></p>

            <!-- Preview de rarezas -->
            <div class="rarity-preview">
                <span style="color:#94a3b8">⚪ Común</span>
                <span style="color:#00cfff">🔵 Poco común</span>
                <span style="color:#a855f7">🟣 Raro</span>
                <span style="color:#f59e0b">🟡 Épico</span>
            </div>
        </div>

        <!-- Formulario -->
        <div class="auth-box">
            <h1>Crear cuenta</h1>
            <p class="auth-subtitle">Empieza hoy y descubre qué Zenix te fue asignado</p>

            <!-- Mensaje de error general -->
            <div class="auth-error" id="auth-error" style="display:none">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span id="auth-error-msg">Error al registrar</span>
            </div>

            <form class="auth-form" id="register-form" novalidate>

                <div class="form-field">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" placeholder="Tu nombre completo" autocomplete="name" required>
                    <span class="field-error" id="error-nombre"></span>
                </div>

                <div class="form-field">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" placeholder="tucorreo@email.com" autocomplete="email" required>
                    <span class="field-error" id="error-email"></span>
                </div>

                <div class="form-field">
                    <label for="password">Contraseña</label>
                    <div class="input-wrap">
                        <input type="password" id="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password" required>
                        <button type="button" class="toggle-pass" id="toggle-pass" tabindex="-1">
                            <i class="fa-solid fa-eye" id="pass-icon"></i>
                        </button>
                    </div>
                    <span class="field-error" id="error-password"></span>
                </div>

                <!-- Términos -->
                <div class="form-check">
                    <input type="checkbox" id="terminos" required>
                    <label for="terminos">
                        Acepto los <a href="terminos.html" target="_blank">términos de uso</a>
                        y la <a href="privacidad.html" target="_blank">política de privacidad</a>
                    </label>
                </div>
                <span class="field-error" id="error-terminos"></span>

                <button type="submit" class="primary-btn" id="register-btn">
                    Crear cuenta y recibir mi Zenix
                    <i class="fa-solid fa-rocket"></i>
                </button>

            </form>

            <div class="auth-footer">
                ¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a>
            </div>
        </div>

    </div>
</main>


<script src="js/app.js"></script>
<script src="js/zenix.js"></script>
<script>
/* ── Lógica del formulario de registro ── */
(function initRegister() {

    const form      = document.getElementById('register-form');
    const btn       = document.getElementById('register-btn');
    const togglePass= document.getElementById('toggle-pass');
    const passInput = document.getElementById('password');
    const passIcon  = document.getElementById('pass-icon');

    /* Mostrar / ocultar contraseña */
    if (togglePass) {
        togglePass.addEventListener('click', () => {
            const isPass = passInput.type === 'password';
            passInput.type = isPass ? 'text' : 'password';
            passIcon.className = isPass ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
        });
    }

    /* Limpiar error al escribir */
    ['nombre','email','password'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.addEventListener('input', () => {
            document.getElementById('error-' + id).textContent = '';
        });
    });

    /* Validación */
    function validar() {
        let ok = true;

        const nombre   = document.getElementById('nombre').value.trim();
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const terminos = document.getElementById('terminos').checked;

        if (nombre.length < 2) {
            document.getElementById('error-nombre').textContent = 'Ingresa tu nombre completo';
            ok = false;
        }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
            document.getElementById('error-email').textContent = 'Ingresa un correo válido';
            ok = false;
        }
        if (password.length < 8) {
            document.getElementById('error-password').textContent = 'La contraseña debe tener mínimo 8 caracteres';
            ok = false;
        }
        if (!terminos) {
            document.getElementById('error-terminos').textContent = 'Debes aceptar los términos';
            ok = false;
        }

        return ok;
    }

    /* Submit */
    form.addEventListener('submit', e => {
        e.preventDefault();
        if (!validar()) return;

        const nombre = document.getElementById('nombre').value.trim();
        const email  = document.getElementById('email').value.trim();

        /* Deshabilitar botón mientras procesa */
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Procesando...';

        /* Simula un pequeño delay de "registro" antes de mostrar el Zenix */
        setTimeout(() => {

            /* Crear perfil con Zenix asignado */
            const perfil = ZenixSystem.crearPerfil(nombre, email);

            /* Mostrar animación de revelación */
            ZenixSystem.mostrarReveal(perfil.zenix_activo, () => {
                /* Al cerrar la revelación va al perfil */
                window.location.href = 'perfil.html';
            });

        }, 800);
    });

})();
</script>
</body>
</html>
